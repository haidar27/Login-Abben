<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abba Bento - Dashboard Karyawan</title>
    <!-- Tambahkan ini -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e11d48">

    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                },
            },
        }
    </script>
</head>
<body class="bg-[#f8fafc] text-slate-700 antialiased flex items-center justify-center min-h-screen p-4">

    <main class="w-full max-w-md">
        
        <div id="loginCard" class="bg-white rounded-3xl border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.03)] p-8 space-y-6">
            <div class="text-center space-y-2">
                <div class="mx-auto w-14 h-14 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center border border-rose-100 shadow-sm">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                    </svg>
                </div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Portal Karyawan</h1>
                <p class="text-xs text-slate-400">Pilih cabang kerja hari ini dan masukkan akun Anda</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Cabang Kerja Hari Ini</label>
                    <select id="loginCabang" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold focus:outline-none focus:border-rose-500 transition-colors text-slate-700">
                        <option value="">-- Pilih Cabang --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Nomor HP</label>
                    <input type="text" id="loginPhone" placeholder="Contoh: 0812345678" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold focus:outline-none focus:border-rose-500 transition-colors">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Password Akun</label>
                    <div class="relative">
                        <input type="password" id="loginPassword" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold focus:outline-none focus:border-rose-500 transition-colors pr-12">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-2 mt-2">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 text-rose-600 rounded border-slate-300">
                    <label for="rememberMe" class="text-[11px] font-semibold text-slate-500">Ingat Saya</label>
                </div>
                <button onclick="prosesLogin()" class="w-full py-3.5 bg-rose-600 hover:bg-rose-700 text-white font-bold text-sm rounded-xl shadow-lg shadow-rose-600/10 transition-all mt-2">
                    Masuk Ke Dashboard
                </button>
            </div>
        </div>

        <div id="dashboardCard" class="hidden bg-white rounded-3xl border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.03)] p-8 space-y-6">
            <div class="flex items-center justify-between border-b border-slate-50 pb-4">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Selamat Datang,</p>
                    <h2 id="txtNamaUser" class="text-base font-bold text-slate-900">-</h2>
                    <p id="txtCabangUser" class="text-[11px] font-semibold text-rose-500 mt-0.5">-</p>
                </div>
                <button onclick="prosesLogout()" class="px-3 py-1.5 text-[11px] font-bold text-rose-600 bg-rose-50 hover:bg-rose-100 border border-rose-200/50 rounded-xl transition-all">
                    Keluar
                </button>
            </div>

            <div class="bg-slate-50 rounded-2xl p-5 text-center space-y-4 border border-slate-100">
                <div>
                    <p id="txtHariTanggal" class="text-xs font-semibold text-slate-400">-</p>
                    <div id="txtLiveJam" class="text-3xl font-extrabold text-slate-900 font-mono tracking-tight my-1">00:00:00</div>
                </div>
                
                <div id="areaTombolAbsen">
                    <p class="text-xs text-slate-400 italic">Memuat status absensi...</p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="bg-slate-50/60 p-3 rounded-2xl border border-slate-100 text-center">
                    <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Hadir</span>
                    <span id="statHadir" class="text-lg font-bold text-slate-800">0 Hari</span>
                </div>
                <div class="bg-slate-50/60 p-3 rounded-2xl border border-slate-100 text-center">
                    <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Telat</span>
                    <span id="statTelat" class="text-lg font-bold text-rose-600">0 Kali</span>
                </div>
                <div class="bg-slate-50/60 p-3 rounded-2xl border border-slate-100 text-center">
                    <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Izin</span>
                    <span id="statIzin" class="text-lg font-bold text-amber-500">0 Hari</span>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyD_gPsy4tfVRTYJJe2e7pEFyGFtP94YY4I",
          authDomain: "abba-bento.firebaseapp.com",
          databaseURL: "https://abba-bento-default-rtdb.firebaseio.com",
          projectId: "abba-bento",
          storageBucket: "abba-bento.firebasestorage.app",
          messagingSenderId: "672080923799",
          appId: "1:672080923799:web:ba8e337095d2bcff062dd2",
          measurementId: "G-TCVVGC0J6R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let daftarCabang = [];
        let karyawan = [];
        let absensi = {};
        let config = {};
        let currentUser = null;
        let currentDayString = new Date().toDateString();

        setInterval(() => {
            const sekarang = new Date();
            document.getElementById('txtLiveJam').innerText = sekarang.toLocaleTimeString('id-ID', { hour12: false });
            
            const opsi = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('txtHariTanggal').innerText = sekarang.toLocaleDateString('id-ID', { ...opsi });

            if (sekarang.toDateString() !== currentDayString) {
                currentDayString = sekarang.toDateString();
                if (currentUser) {
                    updateDashboardTampilan();
                }
            }
        }, 1000);

        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            config = data.config || {};
            
            daftarCabang = data.cabang ? Object.values(data.cabang) : [];
            karyawan = data.karyawan ? Object.values(data.karyawan) : [];
            absensi = data.absensi || {};

            const dropdownCabang = document.getElementById('loginCabang');
            if (dropdownCabang) {
                const savedSelected = dropdownCabang.value;
                dropdownCabang.innerHTML = '<option value="">-- Pilih Cabang --</option>';
                daftarCabang.forEach(cab => {
                    const opt = document.createElement('option');
                    opt.value = cab.nama;
                    opt.innerText = cab.nama;
                    dropdownCabang.appendChild(opt);
                });
                if (savedSelected) dropdownCabang.value = savedSelected;
            }

            if (!currentUser) {
                const savedSessionId = localStorage.getItem('active_session_user_id') || sessionStorage.getItem('active_session_user_id');
                if (savedSessionId && karyawan.length > 0) {
                    const pencarian = karyawan.find(e => e.id === savedSessionId);
                    if (pencarian) {
                        currentUser = pencarian;
                    }
                }
            }

            if (currentUser) {
                currentUser = karyawan.find(e => e.id === currentUser.id) || currentUser;
                updateDashboardTampilan();
            }
        });

        window.togglePassword = function() {
            const pwdInput = document.getElementById('loginPassword');
            pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
        }

        window.prosesLogin = function() {
            const cabang = document.getElementById('loginCabang').value;
            const phone = document.getElementById('loginPhone').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            const isRememberChecked = document.getElementById('rememberMe').checked;

            if (!cabang || !phone || !pass) return alert("Harap lengkapi Cabang Kerja, Nomor HP, dan Password Anda!");

            const userCocok = karyawan.find(e => e.phone === phone && e.password === pass);

            if (userCocok) {
                currentUser = userCocok;
                
                if (isRememberChecked) {
                    localStorage.setItem('active_session_user_id', userCocok.id);
                    localStorage.setItem('active_session_cabang', cabang);
                } else {
                    sessionStorage.setItem('active_session_user_id', userCocok.id);
                    sessionStorage.setItem('active_session_cabang', cabang);
                }

                alert("Login Berhasil! Selamat bekerja.");
                updateDashboardTampilan();
            } else {
                alert("Gagal Login! Kredensial akun salah atau tidak ditemukan.");
            }
        }

        function updateDashboardTampilan() {
            if (!currentUser) return;

            const activeCabang = localStorage.getItem('active_session_cabang') || sessionStorage.getItem('active_session_cabang') || "-";

            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('dashboardCard').classList.remove('hidden');
            document.getElementById('txtNamaUser').innerText = currentUser.nama;
            document.getElementById('txtCabangUser').innerText = "Cabang Aktif: " + activeCabang;

            const hariIniString = new Date().toDateString();
            if (!absensi[currentUser.id]) absensi[currentUser.id] = { history: [] };
            
            let historyArray = [];
            if (absensi[currentUser.id].history) {
                historyArray = Array.isArray(absensi[currentUser.id].history) 
                    ? absensi[currentUser.id].history 
                    : Object.values(absensi[currentUser.id].history);
            }

            const logHariIni = historyArray.find(item => new Date(item.timestamp).toDateString() === hariIniString);
            const containerTombol = document.getElementById('areaTombolAbsen');

            if (!logHariIni) {
                containerTombol.innerHTML = `
                    <p class="text-[10px] font-medium text-slate-400 mb-3">Pastikan GPS HP Aktif & Berada di Radius Cabang</p>
                    <div class="flex gap-2">
                        <button onclick="lakukanAbsensi('Masuk')" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-xl shadow-md transition-all">
                            ABSEN MASUK
                        </button>
                        <button onclick="tampilkanFormIzin()" class="flex-1 py-3 bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold rounded-xl shadow-md transition-all">
                            IZIN KERJA
                        </button>
                    </div>
                    <div id="formIzinArea" class="hidden mt-3 space-y-2 text-left">
                        <input type="text" id="inputAlasanIzin" placeholder="Keterangan izin (Sakit/Acara/Dll)..." class="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-medium focus:outline-none focus:border-amber-500 transition-colors">
                        <div class="flex gap-2">
                            <button onclick="batalIzin()" class="flex-1 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 text-xs font-bold rounded-xl transition-all">Batal</button>
                            <button onclick="kirimIzin()" class="flex-1 py-2 bg-amber-600 hover:bg-amber-700 text-white text-xs font-bold rounded-xl transition-all">Kirim Data Izin</button>
                        </div>
                    </div>
                    `;
            } else if (logHariIni.status === "Izin") {
                containerTombol.innerHTML = `
                    <div class="py-2.5 bg-amber-50 text-amber-600 text-xs font-bold rounded-xl border border-amber-200">
                        ✓ ANDA SEDANG IZIN HARI INI
                    </div>
                    <p class="text-[10px] text-slate-500 mt-2 font-medium">Keterangan: ${logHariIni.keterangan || '-'}</p>`;
            } else if (logHariIni.pulang === "-") {
                containerTombol.innerHTML = `
                    <button onclick="lakukanAbsensi('Pulang')" class="w-full py-3 bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold rounded-xl shadow-md transition-all">
                        ABSEN PULANG (CLOCK OUT)
                    </button>
                    <p class="text-[11px] text-emerald-600 font-semibold mt-2">Anda sudah Clock In pukul ${logHariIni.masuk}</p>`;
            } else {
                containerTombol.innerHTML = `
                    <div class="py-2.5 bg-slate-100 text-slate-500 text-xs font-bold rounded-xl border border-slate-200">
                        ✓ ABSENSI HARI INI SELESAI
                    </div>
                    <p class="text-[10px] text-slate-400 mt-1">Masuk: ${logHariIni.masuk} | Pulang: ${logHariIni.pulang}</p>`;
            }

            let totalHadir = 0;
            let totalTelat = 0;
            let totalIzin = 0;

            historyArray.forEach(h => {
                if(h.status === "Izin") totalIzin++;
                else {
                    totalHadir++;
                    if(h.status === "Terlambat") totalTelat++;
                }
            });

            document.getElementById('statHadir').innerText = totalHadir + " Hari";
            document.getElementById('statTelat').innerText = totalTelat + " Kali";
            document.getElementById('statIzin').innerText = totalIzin + " Hari";
        }

        window.tampilkanFormIzin = function() {
            document.getElementById('formIzinArea').classList.remove('hidden');
        }

        window.batalIzin = function() {
            document.getElementById('formIzinArea').classList.add('hidden');
            document.getElementById('inputAlasanIzin').value = '';
        }

        window.kirimIzin = function() {
            if (!currentUser) return;
            const alasan = document.getElementById('inputAlasanIzin').value.trim();
            
            if (!alasan) {
                return alert("Keterangan izin wajib diisi secara detail!");
            }

            const sekarang = new Date();
            const activeCabang = localStorage.getItem('active_session_cabang') || sessionStorage.getItem('active_session_cabang') || "-";

            if (!absensi[currentUser.id]) absensi[currentUser.id] = { history: [] };
            
            let historyArray = [];
            if (absensi[currentUser.id].history) {
                historyArray = Array.isArray(absensi[currentUser.id].history) 
                    ? absensi[currentUser.id].history 
                    : Object.values(absensi[currentUser.id].history);
            }

            historyArray.push({
                timestamp: sekarang.getTime(),
                masuk: "-",
                pulang: "-",
                status: "Izin",
                keterangan: alasan,
                cabang: activeCabang
            });
            
            set(ref(db, 'absensi/' + currentUser.id + '/history'), historyArray).then(() => {
                alert(`Pengajuan izin untuk hari ini berhasil dicatat. Gaji hari ini akan dipotong secara otomatis dari sistem.`);
                updateDashboardTampilan();
            });
        }

        function hitungJarakMeter(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const phi1 = lat1 * Math.PI / 180;
            const phi2 = lat2 * Math.PI / 180;
            const deltaPhi = (lat2 - lat1) * Math.PI / 180;
            const deltaLambda = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                      Math.cos(phi1) * Math.cos(phi2) *
                      Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;
        }

        window.lakukanAbsensi = function(tipe) {
            if (!currentUser) return;

            const activeCabang = localStorage.getItem('active_session_cabang') || sessionStorage.getItem('active_session_cabang') || "-";

            const eksekusiSimpanFirebase = (tipeAbsen) => {
                const sekarang = new Date();
                const jamMenit = sekarang.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
                const hariIniString = sekarang.toDateString();

                if (!absensi[currentUser.id]) absensi[currentUser.id] = { history: [] };
                
                let historyArray = [];
                if (absensi[currentUser.id].history) {
                    historyArray = Array.isArray(absensi[currentUser.id].history) 
                        ? absensi[currentUser.id].history 
                        : Object.values(absensi[currentUser.id].history);
                }

                let logHariIni = historyArray.find(item => new Date(item.timestamp).toDateString() === hariIniString);

                if (tipeAbsen === 'Masuk') {
                    if (logHariIni) {
                        alert("Anda sudah mencatat log masuk/izin hari ini!");
                        updateDashboardTampilan();
                        return;
                    }
                    
                    let statusMasuk = (jamMenit > (config.jamMasuk || "08:00")) ? "Terlambat" : "Tepat Waktu";
                    historyArray.push({
                        timestamp: sekarang.getTime(),
                        masuk: jamMenit,
                        pulang: "-",
                        status: statusMasuk,
                        cabang: activeCabang
                    });
                    
                    set(ref(db, 'absensi/' + currentUser.id + '/history'), historyArray).then(() => {
                        alert(`Sukses! Log MASUK tersimpan pukul ${jamMenit} (${statusMasuk}) di cabang ${activeCabang}`);
                        updateDashboardTampilan();
                    });

                } else if (tipeAbsen === 'Pulang') {
                    if (!logHariIni) {
                        alert("Gagal! Anda belum absen masuk hari ini.");
                        updateDashboardTampilan();
                        return;
                    }
                    if (logHariIni.pulang !== "-") {
                        alert("Anda sudah absen pulang hari ini.");
                        updateDashboardTampilan();
                        return;
                    }
                    
                    const idx = historyArray.findIndex(item => new Date(item.timestamp).toDateString() === hariIniString);
                    if (idx !== -1) {
                        historyArray[idx].pulang = jamMenit;
                    }
                    
                    set(ref(db, 'absensi/' + currentUser.id + '/history'), historyArray).then(() => {
                        alert(`Sukses! Log PULANG tersimpan pukul ${jamMenit}. Selamat beristirahat!`);
                        updateDashboardTampilan();
                    });
                }
            };

            if (tipe === 'Pulang') {
                document.getElementById('areaTombolAbsen').innerHTML = `<p class="text-xs font-medium text-slate-500 animate-pulse">Memproses absen pulang Anda...</p>`;
                eksekusiSimpanFirebase('Pulang');
                return;
            }

            if (!navigator.geolocation) {
                return alert("Gagal absen! Perangkat Anda tidak mendukung fitur lokasi GPS.");
            }

            document.getElementById('areaTombolAbsen').innerHTML = `<p class="text-xs font-medium text-slate-500 animate-pulse">Sedang memverifikasi lokasi GPS Anda...</p>`;

            navigator.geolocation.getCurrentPosition((position) => {
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;

                const dataCabang = daftarCabang.find(c => c.nama === activeCabang);
                const officeLat = dataCabang ? parseFloat(dataCabang.lat) : null;
                const officeLng = dataCabang ? parseFloat(dataCabang.lng) : null;
                const allowedRadius = dataCabang ? (parseInt(dataCabang.radius) || 50) : 50;

                if (!dataCabang || !officeLat || !officeLng) {
                    alert("Peringatan: Koordinat Cabang tempat Anda bekerja hari ini belum diatur oleh Admin. Absen diteruskan tanpa validasi jarak.");
                    eksekusiSimpanFirebase('Masuk');
                    return;
                }

                const jarakSayaKeKantor = hitungJarakMeter(userLat, userLng, officeLat, officeLng);
                
                if (jarakSayaKeKantor > allowedRadius) {
                    alert(`Absen Ditolak!\n\nJarak Anda saat ini adalah ${Math.round(jarakSayaKeKantor)} meter dari Cabang ${dataCabang.nama}.\nBatas maksimum radius aman adalah ${allowedRadius} meter.`);
                    updateDashboardTampilan(); 
                    return;
                }

                eksekusiSimpanFirebase('Masuk');

            }, (error) => {
                alert(`Gagal membaca lokasi! Pastikan izin GPS sudah diizinkan.\nError: ${error.message}`);
                updateDashboardTampilan();
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        window.prosesLogout = function() {
            if (confirm("Apakah Anda ingin keluar dari akun ini?")) {
                localStorage.removeItem('active_session_user_id');
                localStorage.removeItem('active_session_cabang');
                sessionStorage.removeItem('active_session_user_id');
                sessionStorage.removeItem('active_session_cabang');
                currentUser = null;
                document.getElementById('loginPhone').value = "";
                document.getElementById('loginPassword').value = "";
                document.getElementById('loginCabang').value = "";
                document.getElementById('rememberMe').checked = false;
                document.getElementById('dashboardCard').classList.add('hidden');
                document.getElementById('loginCard').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
